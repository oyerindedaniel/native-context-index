[package]
name = "nci-engine"
version = "0.1.0"
edition = "2024"
autotests = false
description = "High-performance Rust engine for Native Context Indexing of TypeScript declaration files"
authors = ["Oyerinde Daniel"]
license = "Apache-2.0"
homepage = "https://nativecontextindex.com"
repository = "https://github.com/oyerindedaniel/native-context-index"
keywords = ["typescript", "declarations", "indexing", "cli", "sqlite"]
categories = ["command-line-utilities", "development-tools"]

[dependencies]
oxc_parser = "0.122.0"
oxc_allocator = "0.122.0"
oxc_ast = "0.122.0"
oxc_span = "0.122.0"
serde = { version = "1", features = ["derive", "rc"] }
serde_json = "1"
phf = { version = "0.13.1", features = ["macros"] }
rayon = "1.11.0"
thiserror = "2.0.18"
regex = "1"
pathdiff = "0.2"
dirs = "6"
rusqlite = { version = "0.39", features = ["bundled"] }
tracing = "0.1"
dashmap = "6.1.0"
clap = { version = "4.6", features = ["derive"] }
dialoguer = "0.11.0"
clap_complete = "4.6.0"
supports-color = "3.0.2"
enable-ansi-support = "0.3.1"

[features]
# Phase/crawl stderr profiling when `NCI_PROFILE=1` (e.g. `cargo run --example demo --features phase-profile -- --profile`).
phase-profile = []
# Registers `TEST_PENDING_BACKFILL_VERSION` backfill step for integration tests and `cargo test`.
# Required for `cli_binary` tests — see module comment in `tests/cli_binary.rs`.
test-support = []

[[test]]
name = "cli_binary"
path = "tests/cli_binary.rs"
required-features = ["test-support"]

[[test]]
name = "snapshot_tests"
path = "tests/snapshot_tests.rs"

[[bin]]
name = "nci"
path = "src/main.rs"

[dev-dependencies]
assert_cmd = "2.2.0"
dotenvy = "0.15.7"
insta = { version = "1.46.3", features = ["json"] }
predicates = "3"
tempfile = "3"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
