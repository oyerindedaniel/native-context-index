name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy -p nci-engine --all-targets -- -D warnings
      - name: cargo test
        run: cargo test -p nci-engine
      - name: cargo check (phase-profile feature)
        run: cargo check -p nci-engine --all-targets --features phase-profile
